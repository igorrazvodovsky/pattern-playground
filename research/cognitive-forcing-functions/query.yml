story: src/stories/actions/application/CognitiveForcingFunctions.mdx
topic: cognitive forcing functions in AI-assisted decision-making
interaction: |
  A user faces a discrete accept/reject decision on an AI recommendation.
  The interface interposes a moment of active cognition (wait, decide-first,
  articulate, complete) before acceptance, so the user engages judgement
  instead of rubber-stamping the system's answer.
context: |
  AI-assisted decision-making interfaces — medical, legal, financial, safety-
  critical, or high-stakes analytical work. Assumes the user has domain
  competence. Not warranted when stakes are low, user lacks evaluative
  competence, or speed dominates. Susceptibility varies with need-for-cognition.
questions:
